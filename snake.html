<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪吃蛇 Snake Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #fff;
    }
    h1 {
      margin-bottom: 20px;
      text-shadow: 0 0 10px #00ff88;
    }
    #gameCanvas {
      border: 2px solid #00ff88;
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
      background: #0a0a1a;
    }
    .score {
      margin-top: 20px;
      font-size: 1.5rem;
    }
    .controls {
      margin-top: 15px;
      color: #888;
      font-size: 0.9rem;
    }
    #restartBtn {
      margin-top: 20px;
      padding: 10px 30px;
      font-size: 1rem;
      background: #00ff88;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      color: #1a1a2e;
      font-weight: bold;
    }
    #restartBtn:hover {
      background: #00cc6a;
    }
  </style>
</head>
<body>
  <h1>🐍 贪吃蛇</h1>
  <canvas id="gameCanvas" width="400" height="400"></canvas>
  <div class="score">得分: <span id="score">0</span></div>
  <button id="restartBtn" onclick="resetGame()">重新开始</button>
  <div class="controls">使用方向键 或 WASD 控制移动</div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;

    let snake = [];
    let food = { x: 10, y: 10 };
    let dx = 0;
    let dy = 0;
    let score = 0;
    let gameLoop = null;
    let isGameRunning = false;

    function initGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      dx = 1;
      dy = 0;
      score = 0;
      scoreElement.textContent = score;
      placeFood();
      isGameRunning = true;
      
      if (gameLoop) clearInterval(gameLoop);
      gameLoop = setInterval(gameStep, 100);
    }

    function placeFood() {
      food.x = Math.floor(Math.random() * tileCount);
      food.y = Math.floor(Math.random() * tileCount);
      
      // 確保食物不會出現在蛇身上
      for (let segment of snake) {
        if (segment.x === food.x && segment.y === food.y) {
          placeFood();
          break;
        }
      }
    }

    function gameStep() {
      if (!isGameRunning) return;

      const head = { x: snake[0].x + dx, y: snake[0].y + dy };

      // 檢查撞牆
      if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
        gameOver();
        return;
      }

      // 檢查撞自己
      for (let segment of snake) {
        if (head.x === segment.x && head.y === segment.y) {
          gameOver();
          return;
        }
      }

      snake.unshift(head);

      // 吃到食物
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreElement.textContent = score;
        placeFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function draw() {
      // 清空畫布
      ctx.fillStyle = '#0a0a1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 畫食物
      ctx.fillStyle = '#ff6b6b';
      ctx.shadowColor = '#ff6b6b';
      ctx.shadowBlur = 10;
      ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);

      // 畫蛇
      ctx.shadowBlur = 0;
      snake.forEach((segment, index) => {
        ctx.fillStyle = index === 0 ? '#00ff88' : '#00cc6a';
        ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
      });
    }

    function gameOver() {
      isGameRunning = false;
      clearInterval(gameLoop);
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#ff6b6b';
      ctx.font = '30px PingFang SC';
      ctx.textAlign = 'center';
      ctx.fillText('游戏结束!', canvas.width / 2, canvas.height / 2);
      ctx.font = '20px PingFang SC';
      ctx.fillStyle = '#fff';
      ctx.fillText(`最终得分: ${score}`, canvas.width / 2, canvas.height / 2 + 40);
    }

    function resetGame() {
      initGame();
    }

    // 鍵盤控制
    document.addEventListener('keydown', (e) => {
      switch(e.key) {
        case 'ArrowUp':
        case 'w':
        case 'W':
          if (dy !== 1) { dx = 0; dy = -1; }
          break;
        case 'ArrowDown':
        case 's':
        case 'S':
          if (dy !== -1) { dx = 0; dy = 1; }
          break;
        case 'ArrowLeft':
        case 'a':
        case 'A':
          if (dx !== 1) { dx = -1; dy = 0; }
          break;
        case 'ArrowRight':
        case 'd':
        case 'D':
          if (dx !== -1) { dx = 1; dy = 0; }
          break;
      }
    });

    // 開始遊戲
    initGame();
  </script>
</body>
</html>
